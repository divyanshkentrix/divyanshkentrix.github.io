const salesUnit = 'INR ';
let waterfallChart, neighborChart;

function formatCurrency(val) { return salesUnit + val.toLocaleString('en-IN'); }

function loadStore(storeId) {
    const data = storesData[storeId];
    if (!data) return;

    // Update metrics
    document.getElementById('metricsPanel').innerHTML = `
        <div class="metric"><div class="label">Predicted Sales</div><div class="value neutral">${formatCurrency(data.predicted_sales)}</div></div>
        <div class="metric"><div class="label">Cannibalization</div><div class="value negative">${formatCurrency(data.total_cannib)}</div></div>
        <div class="metric"><div class="label">Cluster Lift</div><div class="value positive">${formatCurrency(data.total_lift)}</div></div>
        <div class="metric"><div class="label">Net Network Impact</div><div class="value ${data.net_impact >= 0 ? 'positive' : 'negative'}">${formatCurrency(data.net_impact)}</div></div>
        <div class="metric"><div class="label">Cannibalization Ratio</div><div class="value">${(data.ratio * 100).toFixed(1)}%</div></div>
    `;

    // Update waterfall chart
    if (waterfallChart) waterfallChart.destroy();
    const wfCtx = document.getElementById('waterfallChart').getContext('2d');
    waterfallChart = new Chart(wfCtx, {
        type: 'bar',
        data: {
            labels: ['New Store Sales', 'Cannibalization', 'Cluster Lift', 'Net Impact'],
            datasets: [{
                data: [data.predicted_sales, data.total_cannib, data.total_lift, data.net_impact],
                backgroundColor: ['#3b82f6', '#dc2626', '#16a34a', data.net_impact >= 0 ? '#16a34a' : '#dc2626']
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // Update neighbor chart
    if (neighborChart) neighborChart.destroy();
    const nCtx = document.getElementById('neighborChart').getContext('2d');
    const neighbors = data.neighbors.slice(0, 10);
    neighborChart = new Chart(nCtx, {
        type: 'bar',
        data: {
            labels: neighbors.map(n => n.name || `Store ${n.id}`),
            datasets: [{
                label: '% Change',
                data: neighbors.map(n => n.pct_change),
                backgroundColor: neighbors.map(n => n.pct_change < 0 ? '#dc2626' : '#16a34a')
            }]
        },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } }
    });

    // Update table
    const tbody = document.querySelector('#neighborTable tbody');
    tbody.innerHTML = data.neighbors.map(n => `
        <tr>
            <td>${n.name || 'Store ' + n.id}</td>
            <td>${n.portfolio}</td>
            <td>${n.distance.toFixed(0)}m</td>
            <td>${formatCurrency(n.current_sales)}</td>
            <td class="${n.pct_change < 0 ? 'negative' : 'positive'}">${n.pct_change.toFixed(1)}%</td>
            <td class="${n.abs_impact < 0 ? 'negative' : 'positive'}">${formatCurrency(n.abs_impact)}</td>
        </tr>
    `).join('');
}

// Load first store on page load
setTimeout(() => {
    const firstStore = Object.keys(storesData)[0];
    if (firstStore) {
        document.getElementById('storeSelect').value = firstStore;
        loadStore(firstStore);
    }
});
</script>
